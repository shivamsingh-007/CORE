<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loop Agent Banner</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  background: #0f172a; 
  display: flex; 
  justify-content: center; 
  align-items: center; 
  min-height: 100vh;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}
.banner {
  background: linear-gradient(135deg, #1e293b 0%, #0f172a 50%, #1a1a2e 100%);
  width: 1200px;
  padding: 48px 64px;
  border-radius: 24px;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(99, 102, 241, 0.2);
  box-shadow: 0 25px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
}
.banner::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 40%, rgba(99,102,241,0.08) 0%, transparent 50%),
              radial-gradient(circle at 70% 60%, rgba(139,92,246,0.06) 0%, transparent 50%);
  pointer-events: none;
}
.grid-lines {
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}
.content { position: relative; z-index: 1; }
.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(99,102,241,0.15);
  border: 1px solid rgba(99,102,241,0.3);
  padding: 6px 16px;
  border-radius: 100px;
  font-size: 13px;
  color: #818cf8;
  font-weight: 500;
  letter-spacing: 0.5px;
  margin-bottom: 24px;
}
.badge .dot {
  width: 8px;
  height: 8px;
  background: #22d3ee;
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
h1 {
  font-size: 52px;
  font-weight: 800;
  color: #f1f5f9;
  letter-spacing: -1.5px;
  line-height: 1.1;
  margin-bottom: 12px;
}
h1 span {
  background: linear-gradient(135deg, #818cf8, #22d3ee);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.subtitle {
  font-size: 20px;
  color: #94a3b8;
  font-weight: 400;
  line-height: 1.5;
  max-width: 700px;
  margin-bottom: 32px;
}
.features {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
}
.feature {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  padding: 10px 18px;
  border-radius: 12px;
  color: #cbd5e1;
  font-size: 14px;
  font-weight: 500;
}
.feature-icon {
  width: 20px;
  height: 20px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
}
.f1 { background: rgba(99,102,241,0.2); color: #818cf8; }
.f2 { background: rgba(34,211,238,0.2); color: #22d3ee; }
.f3 { background: rgba(251,191,36,0.2); color: #fbbf24; }
.f4 { background: rgba(52,211,153,0.2); color: #34d399; }
.f5 { background: rgba(244,114,182,0.2); color: #f472b6; }
.f6 { background: rgba(167,139,250,0.2); color: #a78bfa; }
</style>
</head>
<body>
<div class="banner">
  <div class="grid-lines"></div>
  <div class="content">
    <div class="badge"><span class="dot"></span> v1.0.0 — Autonomous Multi-Agent Pipeline</div>
    <h1>Loop <span>Agent</span></h1>
    <p class="subtitle">An autonomous multi-agent system that takes a project goal and runs a full development pipeline with zero manual intervention.</p>
    <div class="features">
      <div class="feature"><span class="feature-icon f1">⟳</span> Autonomous Loop</div>
      <div class="feature"><span class="feature-icon f2">🧠</span> 5 Specialized Agents</div>
      <div class="feature"><span class="feature-icon f3">📋</span> SKILL.md Format</div>
      <div class="feature"><span class="feature-icon f4">🐛</span> T3MP3ST Bug Hunter</div>
      <div class="feature"><span class="feature-icon f5">💾</span> Auto-Sync State</div>
      <div class="feature"><span class="feature-icon f6">▶</span> Resume Support</div>
    </div>
  </div>
</div>
</body>
</html>
